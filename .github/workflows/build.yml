name: Build UzTrajectory
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Extract mod source
        run: unzip -o uztrajectory-mod.zip
      - uses: gradle/actions/setup-gradle@v4
      - name: Build mod
        working-directory: uztrajectory
        run: gradle build
      - uses: actions/upload-artifact@v4
        with:
          name: uztrajectory-jar
          path: uztrajectory/build/libs/*.jar
